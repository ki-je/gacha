<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>평행세계 랜덤 뽑기</title>
    <style>
        :root {
            --gold-light: #fff3a0;
            --gold-main: #ffcf40;
            --gold-dark: #b8860b;
            --bg-dark: #0a0a0c;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* 768:1344 비율 컨테이너 */
        #app {
            position: relative;
            width: 100vw;
            height: 175vw; 
            max-width: 500px;
            max-height: 875px;
            margin: 0 auto;
            background-color: var(--bg-dark);
            overflow: hidden;
            border: 1px solid #333;
        }

        .page {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            background-size: cover;
            background-position: center;
        }

        .active { display: flex; }

        /* 페이지 1: 대기 화면 */
        #page1 {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('B.png');
            background-size: cover;
        }

        h1 {
            font-size: 2.8rem;
            background: linear-gradient(to bottom, #fff, var(--gold-main));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 10px rgba(255,207,64,0.5));
            margin-bottom: 5px;
        }

/* 네온사인 버튼 디자인 */
.premium-btn {
    position: relative;
    margin-top: 40px;
    padding: 20px 60px;
    font-size: 1.5rem;
    font-weight: bold;
    
    /* 배경 및 테두리 */
    background: transparent;
    color: #f0f; /* 네온 민트 색상 */
    border: 3px solid #f0f;
    border-radius: 10px; /* 약간 각진 느낌이 네온에 잘 어울림 */
    
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 2px;
    transition: all 0.3s;

    /* 네온 발광 효과 (바깥쪽과 안쪽 모두) */
    text-shadow: 
        0 0 7px #fff,
        0 0 10px #f0f,
        0 0 21px #f0f;
    box-shadow: 
        0 0 5px #f0f,
        inset 0 0 5px #f0f,
        0 0 15px #f0f,
        inset 0 0 15px #f0f;
}

/* 호버 시 불빛이 강해지는 효과 */
.premium-btn:hover {
    color: #fff;
    background: #f0f;
    box-shadow: 
        0 0 10px #f0f,
        0 0 30px #f0f,
        0 0 60px #f0f;
    text-shadow: none;
}

/* 클릭 시 살짝 들어가는 느낌 */
.premium-btn:active {
    transform: scale(0.98);
    filter: brightness(0.8);
}

/* 가끔씩 지지직거리는 네온 애니메이션 (선택사항) */
@keyframes flicker {
    0%, 18%, 22%, 25%, 53%, 57%, 100% {
        text-shadow: 0 0 7px #fff, 0 0 10px #f0f, 0 0 21px #f0f;
        box-shadow: 0 0 5px #f0f, inset 0 0 5px #f0f, 0 0 15px #f0f, inset 0 0 15px #f0f;
    }
    20%, 24%, 55% {       
        text-shadow: none;
        box-shadow: none;
        opacity: 0.5;
    }
}

/* 애니메이션 적용 (버튼에 생동감을 주려면 추가) */
#page2 .premium-btn {
    animation: flicker 3s infinite alternate;
}

        /* 페이지 2: 가챠 대기 (배경만) */
        #page2 { background-image: url('B.png'); }

        /* 페이지 3: 소환 연출 */
        #page-effect {
            background: radial-gradient(circle, #1a1a2e 0%, #000 100%);
            cursor: pointer;
        }

        .summon-circle {
            width: 250px;
            height: 250px;
            border: 3px solid #ff00ff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px #ff00ff, inset 0 0 15px #ff00ff;
            animation: rotateCircle 10s linear infinite;
        }

        .summon-text {
            position: absolute;
            font-size: 1.4rem;
            font-weight: 200;
            letter-spacing: 5px;
            color: #fff;
            text-shadow: 0 0 15px var(--gold-main);
            animation: textPulse 1.5s infinite ease-in-out;
        }

        /* 페이지 4: 결과 화면 */
        .char-img {
            position: absolute;
            width: 100%; height: 100%;
            object-fit: cover;
            animation: zoomEffect 1.2s ease-out;
        }

        .result-info {
            position: absolute;
            bottom: 120px;
            width: 100%;
            z-index: 5;
            pointer-events: none;
        }

        .char-name {
            font-size: 4rem;
            font-weight: 900;
            margin: 0;
            color: #fff;
            /* 테두리 효과로 가독성 확보 */
            text-shadow: 
                -2px -2px 0 #000,  2px -2px 0 #000,
                -2px  2px 0 #000,  2px  2px 0 #000,
                0 0 25px rgba(0,0,0,0.8);
            letter-spacing: -2px;
        }

        .work-title {
            font-size: 1.3rem;
            color: var(--gold-light);
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0,0,0,1);
            margin-top: 5px;
        }

        .retry-btn {
            position: absolute;
            bottom: 40px;
            padding: 10px 30px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            border: 1px solid #fff;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            z-index: 10;
        }

        /* 애니메이션 정의 */
        @keyframes rotateCircle { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes textPulse { 
            0%, 100% { opacity: 0.3; transform: scale(0.9); } 
            50% { opacity: 1; transform: scale(1.05); } 
        }
        @keyframes zoomEffect {
            0% { transform: scale(1.3); filter: brightness(2) whiteout; }
            100% { transform: scale(1); filter: brightness(1); }
        }

        .flash {
            position: absolute;
            top:0; left:0; width:100%; height:100%;
            background: #fff; z-index: 100;
            pointer-events: none; opacity: 0;
        }
        .flash-active { animation: flashAnim 0.6s ease-out; }
        @keyframes flashAnim { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

<div id="app">
    <div id="flash-overlay" class="flash"></div>

    <section id="page1" class="page active">
        <h1>평행세계 랜덤 뽑기</h1>
        <div style="letter-spacing: 3px; opacity: 0.8;">당신의 아이돌을 찾아보세요</div>
        <button class="premium-btn" onclick="showPage('page2')">START</button>
    </section>

    <section id="page2" class="page">
        <button class="premium-btn" onclick="startGacha()" style="padding: 30px 50px;">
            <div style="font-size: 0.8rem; opacity: 0.8;">PREMIUM</div>
            ☆★1회 소환하기★☆
        </button>
    </section>

    <section id="page-effect" class="page" onclick="revealResult()">
        <div class="summon-circle"></div>
        <div class="summon-text">소환중... 화면을 터치하세요</div>
    </section>

    <section id="page-result" class="page">
        <img id="result-img" src="" class="char-img">
        <div class="result-info">
            <h2 id="result-name" class="char-name"></h2>
            <div id="result-work" class="work-title"></div>
        </div>
        <button class="retry-btn" onclick="showPage('page2')">다시 소환</button>
    </section>
</div>

<script>
    const characterData = [
        { id: 1, name: "칼덴", work: "｜Nova Core V2｜" },
        { id: 2, name: "이드", work: "｜Nova Core V2｜" },
        { id: 3, name: "듀렌", work: "｜Nova Core V2｜" },
        { id: 4, name: "리오르", work: "｜Nova Core V2｜" },
        { id: 5, name: "세르", work: "｜Nova Core V2｜" },
        { id: 6, name: "글리치", work: "빌런플레이어" },
        { id: 7, name: "넥로", work: "빌런플레이어" },
        { id: 8, name: "블레인", work: "빌런플레이어" },
        { id: 9, name: "리른", work: "남편은 버리고 내게와" },
        { id: 10, name: "나인", work: "남편은 버리고 내게와" },
        { id: 11, name: "제르온", work: "남편은 버리고 내게와" },
        { id: 12, name: "에커드", work: "남편은 버리고 내게와" },
        { id: 13, name: "티아", work: "아카데미 F급 낙제생" },
        { id: 14, name: "페리", work: "아카데미 F급 낙제생" },
        { id: 15, name: "카샨", work: "아카데미 F급 낙제생" },
        { id: 16, name: "리안", work: "아카데미 F급 낙제생" },
        { id: 17, name: "힐더", work: "아카데미 F급 낙제생" },
        { id: 18, name: "휴", work: "야 성녀 벌려" },
        { id: 19, name: "아스", work: "야 성녀 벌려" },
        { id: 20, name: "프란츠", work: "야 성녀 벌려" },
        { id: 21, name: "사이카", work: "지하실" },
        { id: 22, name: "아던", work: "죽은 연인의 대체품" },
        { id: 23, name: "능천화", work: "처녀↔동정 방어전" },
        { id: 24, name: "사언", work: "뭐해? 웃어" },
        { id: 25, name: "리겔", work: "Orbis Talis" },
        { id: 26, name: "킬리언", work: "Orbis Talis" },
        { id: 27, name: "론", work: "Orbis Talis" }
    ];

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    function startGacha() {
        const random = characterData[Math.floor(Math.random() * characterData.length)];
        
        // 확장자 수정 반영: .jpeg
        document.getElementById('result-img').src = `${random.id}.jpeg`;
        document.getElementById('result-name').innerText = random.name;
        document.getElementById('result-work').innerText = random.work;
        
        showPage('page-effect');
    }

    function revealResult() {
        const flash = document.getElementById('flash-overlay');
        flash.classList.remove('flash-active');
        void flash.offsetWidth; // 리플로우 강제 (애니메이션 재시작)
        flash.classList.add('flash-active');
        
        showPage('page-result');
    }
</script>

</body>
</html>
